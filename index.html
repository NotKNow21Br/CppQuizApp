<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CppQuizApp - Impara il C++</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <main class="app-container">
        <!-- Header con statistiche -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-text">C++</span> QuizApp
            </div>
            <div class="stats">
                <div class="stat-box">
                    <span class="stat-label">Punteggio</span>
                    <span id="score-display" class="stat-value">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Domande</span>
                    <span id="question-count" class="stat-value">0/0</span>
                </div>
                <button id="reset-btn" class="btn-icon" title="Azzera progressi">🔄</button>
            </div>
        </header>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <!-- Sezione Iniziale (Dashboard Moduli) -->
        <section id="start-screen" class="screen active">
            <h1>Percorso di Studio C++</h1>
            <p>Seleziona un argomento. Devi prima leggere la teoria per sbloccare il relativo Quiz!</p>
            
            <div id="modules-container" class="modules-grid">
                <!-- I moduli verranno generati da JS -->
            </div>
        </section>

        <!-- Sezione Lezione Teoria -->
        <section id="lesson-screen" class="screen">
            <button id="back-to-dash-btn" class="btn-icon mb-4">← Torna ai Moduli</button>
            <div class="lesson-header">
                <span class="badge">Teoria</span>
            </div>
            <h2 id="lesson-title">Titolo Lezione</h2>
            
            <div id="lesson-content" class="lesson-content-box">
                <!-- Contenuto dinamico della lezione -->
            </div>
            
            <div class="lesson-footer">
                <button id="finish-lesson-btn" class="btn-primary w-full">Ho Letto e Capito ✓</button>
            </div>
        </section>

        <!-- Sezione Quiz -->
        <section id="quiz-screen" class="screen">
            <div class="question-header">
                <span id="topic-badge" class="badge">Argomento</span>
            </div>
            <h2 id="question-text">Testo della domanda...</h2>
            
            <div id="code-snippet-container" class="code-container hidden">
                <pre><code id="code-snippet" class="language-cpp"></code></pre>
            </div>

            <div id="options-container" class="options-grid">
                <!-- I bottoni verranno inseriti dinamicamente qui -->
            </div>

            <!-- Feedback e Spiegazione (inizialmente nascosti) -->
            <div id="feedback-container" class="feedback-box hidden">
                <div id="feedback-status" class="feedback-status"></div>
                <h3 id="feedback-title">Risultato</h3>
                <p id="explanation-text">Spiegazione della risposta corretta.</p>
                
                <!-- Contenitore visivo per schemi dinamici (matrici, buffer, ecc) -->
                <div id="visual-explanation" class="visual-explanation hidden">
                    <!-- Il contenuto generato da JS andrà qui -->
                </div>

                <button id="next-btn" class="btn-secondary">Prossima Domanda ➔</button>
            </div>
        </section>

        <!-- Sezione Risultati -->
        <section id="result-screen" class="screen">
            <h2>Sessione Completata!</h2>
            <div class="final-score">
                <span id="final-score-val" class="huge-text">0</span>
                <span class="muted-text">Punti guadagnati</span>
            </div>
            <div id="summary-container" class="summary-box">
                <!-- Riepilogo errori e suggerimenti -->
            </div>
            <button id="restart-btn" class="btn-primary">Nuova Sessione</button>
        </section>

    </main>

    <script src="lessons.js"></script>
    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
